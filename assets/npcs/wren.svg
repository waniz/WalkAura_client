<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Archivist Wren — loremaster, hooded teal robe, curious-haunted. -->
  <path d="M16 121c3-22 14-36 30-46 8 4 28 4 36 0 16 10 27 24 30 46H16z" fill="#1f3a40"/>
  <path d="M28 121c2-15 10-27 24-35h24c14 8 22 20 24 35H28z" fill="#2b4a52"/>
  <!-- hood -->
  <path d="M30 70c0-30 15-50 34-50s34 20 34 50c-8-12-17-18-26-20l-3 14H59l-3-14c-9 2-18 8-26 20z" fill="#24424a"/>
  <path d="M36 66c2-26 13-43 28-43s26 17 28 43c-8-9-17-13-28-13s-20 4-28 13z" fill="#356069"/>
  <path d="M38 64c14-9 38-9 52 0-2-22-13-37-26-37S40 42 38 64z" fill="#1f3a40"/>
  <!-- hood inner trim -->
  <path d="M44 60c12-7 28-7 40 0l-3 8c-11-5-23-5-34 0l-3-8z" fill="#7fb0a0" opacity=".5"/>
  <!-- neck -->
  <path d="M56 80h16v12c0 4-4 6-8 6s-8-2-8-6V80z" fill="#c2a382"/>
  <!-- face (pale, scholarly) -->
  <path d="M45 58c0-18 8-29 19-29 12 0 20 11 20 30 0 18-9 31-20 31S45 76 45 58z" fill="#cdb091"/>
  <path d="M47 55c3-14 8-22 17-22 6 0 12 5 15 13-9-5-21-3-32 9z" fill="#e0c9a8" opacity=".25"/>
  <!-- loose hair strands at temples -->
  <path d="M45 52c-3 8-3 18 1 27-5-3-8-9-8-16 0-5 3-9 7-11z" fill="#6b4a36"/>
  <path d="M83 52c3 8 3 18-1 27 5-3 8-9 8-16 0-5-3-9-7-11z" fill="#5a3d2c"/>
  <!-- brows (one raised — curious) -->
  <path d="M50 53c5-3 10-3 14 1" fill="none" stroke="#5a3d2c" stroke-width="3" stroke-linecap="round"/>
  <path d="M69 51c4-2 8-1 11 2" fill="none" stroke="#5a3d2c" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes + small round lens/loupe over right eye -->
  <circle cx="57" cy="61" r="2.3" fill="#2f4a44"/>
  <circle cx="57.7" cy="60.2" r=".8" fill="#dff0e8"/>
  <circle cx="73" cy="61" r="6.5" fill="none" stroke="#FFC842" stroke-width="2"/>
  <circle cx="73" cy="61" r="2.3" fill="#2f4a44"/>
  <path d="M79 61h7" fill="none" stroke="#FFC842" stroke-width="2" stroke-linecap="round"/>
  <!-- mouth (slight, thoughtful) -->
  <path d="M57 74c4 2 9 2 13 0" fill="none" stroke="#8a6a50" stroke-width="2.5" stroke-linecap="round"/>
  <!-- quill tucked at collar -->
  <path d="M78 92l10-20" fill="none" stroke="#e8e2d2" stroke-width="3" stroke-linecap="round"/>
  <path d="M86 76l4-7 1 6-5 1z" fill="#FFC842"/>
</svg>
